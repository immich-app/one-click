
services:
  caddy:
    container_name: immich_caddy
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    depends_on:
      - immich-server
    ports:
      - 443:443
      - 80:80
    volumes:
      - ${CADDY_LOCATION:-./caddy}/Caddyfile:/etc/caddy/Caddyfile
      - ${CADDY_LOCATION:-./caddy}/caddy_conf:/config
      - ${CADDY_LOCATION:-./caddy}/caddy_data:/data
    restart: always
